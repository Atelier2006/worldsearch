<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アスユイのお気に入りワールド</title>
<style>
  :root{
    --bg:#0d0d0f;
    --surface:#141417;
    --surface-2:#1b1b1f;
    --line:#2a2a30;
    --line-soft:#212127;
    --text:#e9e9ec;
    --muted:#9a9aa4;
    --dim:#66666f;
    --accent:#c8a45c;
    --accent-soft:#3a3020;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); min-height:100vh;
    font-family:"Yu Gothic UI","Hiragino Kaku Gothic ProN","Segoe UI",Meiryo,system-ui,sans-serif;
    font-size:15px; line-height:1.7; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}
  .wrap{width:100%; max-width:2000px; margin:0 auto; padding:0 clamp(16px,2.5vw,44px) 96px;}

  /* ---------- header ---------- */
  header{padding:40px 0 0;}
  .masthead{display:flex; align-items:baseline; justify-content:space-between; gap:24px; flex-wrap:wrap;
    padding-bottom:20px; border-bottom:1px solid var(--line);}
  h1{
    margin:0; font-size:27px; font-weight:500; letter-spacing:.04em;
    font-family:"Yu Mincho","Hiragino Mincho ProN",Georgia,serif;
  }
  h1 .thin{color:var(--muted); font-size:19px; margin-left:14px; letter-spacing:.08em;}
  .byline{font-size:12.5px; color:var(--dim); letter-spacing:.12em; text-transform:uppercase;}
  .byline b{color:var(--muted); font-weight:500;}

  /* ---------- category nav ---------- */
  nav.cats{display:flex; gap:30px; flex-wrap:wrap; padding:16px 0 0; border-bottom:1px solid var(--line-soft);}
  .cat{
    padding:8px 0 14px; cursor:pointer; color:var(--muted); font-size:15px;
    border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .12s;
    white-space:nowrap;
  }
  .cat:hover{color:var(--text)}
  .cat.active{color:var(--text); border-bottom-color:var(--accent)}
  .cat .n{font-size:11.5px; color:var(--dim); margin-left:7px; font-variant-numeric:tabular-nums;}
  .cat.active .n{color:var(--accent)}
  .catdesc{color:var(--muted); font-size:13.5px; padding:16px 0 0;}

  /* ---------- controls ---------- */
  .controls{display:flex; gap:14px; align-items:center; flex-wrap:wrap; padding:20px 0 0;}
  .search{flex:1; min-width:260px; position:relative;}
  .search input{
    width:100%; padding:11px 14px; border:1px solid var(--line); background:var(--surface);
    color:var(--text); font-size:14px; border-radius:4px; outline:none; font-family:inherit;
  }
  .search input::placeholder{color:var(--dim)}
  .search input:focus{border-color:#454550}
  select{
    padding:11px 12px; border:1px solid var(--line); background:var(--surface); color:var(--text);
    font-size:13.5px; border-radius:4px; outline:none; cursor:pointer; font-family:inherit;
  }
  .count{font-size:12.5px; color:var(--dim); font-variant-numeric:tabular-nums; white-space:nowrap;}

  /* ---------- tag filter ---------- */
  .chips{display:flex; gap:7px; flex-wrap:wrap; padding:16px 0 0;}
  .chip{
    font-size:12px; padding:4px 10px; border:1px solid var(--line); border-radius:3px;
    color:var(--muted); cursor:pointer; background:transparent; transition:.12s; white-space:nowrap;
  }
  .chip:hover{color:var(--text); border-color:#3d3d46}
  .chip.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent)}
  .chip .n{color:var(--dim); margin-left:5px; font-variant-numeric:tabular-nums;}
  .chip.on .n{color:var(--accent); opacity:.7}

  /* ---------- grid ---------- */
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr));
    gap:26px 20px; padding:30px 0 0;
  }
  .card{cursor:pointer; display:flex; flex-direction:column;}
  .thumb{
    position:relative; aspect-ratio:16/10; background:var(--surface-2); overflow:hidden;
    border:1px solid var(--line-soft); border-radius:3px;
  }
  .thumb img{width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s ease;}
  .card:hover .thumb img{transform:scale(1.035)}
  .card:hover .thumb{border-color:#3d3d46}
  .thumb .cap{
    position:absolute; right:8px; bottom:8px; background:rgba(10,10,12,.82);
    font-size:11px; padding:2px 7px; border-radius:2px; color:var(--text);
    font-variant-numeric:tabular-nums; letter-spacing:.02em;
  }
  .body{padding:11px 2px 0; display:flex; flex-direction:column; gap:6px;}
  .sub{font-size:11px; color:var(--accent); letter-spacing:.06em;}
  .cardname{font-size:14.5px; font-weight:600; line-height:1.45;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .note{font-size:12.5px; color:var(--muted); line-height:1.65;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .meta{font-size:11.5px; color:var(--dim); display:flex; gap:14px; font-variant-numeric:tabular-nums;}

  .empty{grid-column:1/-1; text-align:center; padding:90px 20px; color:var(--dim); font-size:14px;}

  /* ---------- modal ---------- */
  .overlay{position:fixed; inset:0; background:rgba(6,6,8,.86); display:none;
    align-items:flex-start; justify-content:center; padding:56px 20px; z-index:50; overflow:auto;}
  .overlay.show{display:flex}
  .modal{background:var(--surface); border:1px solid var(--line); border-radius:5px;
    max-width:720px; width:100%;}
  .mhero{position:relative; aspect-ratio:16/9; background:var(--surface-2); overflow:hidden;}
  .mhero img{width:100%; height:100%; object-fit:cover}
  .close{position:absolute; top:12px; right:12px; width:32px; height:32px; border-radius:3px;
    background:rgba(10,10,12,.8); border:1px solid var(--line); color:var(--text); font-size:15px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .close:hover{background:rgba(10,10,12,.95)}
  .mbody{padding:26px 30px 32px}
  .mbody h2{margin:0 0 6px; font-size:20px; font-weight:600; line-height:1.45}
  .msub{color:var(--dim); font-size:12px; margin-bottom:22px; letter-spacing:.03em}
  .stats{display:flex; gap:34px; flex-wrap:wrap; padding:16px 0; margin-bottom:22px;
    border-top:1px solid var(--line-soft); border-bottom:1px solid var(--line-soft);}
  .stat .n{font-size:16px; font-weight:600; font-variant-numeric:tabular-nums;}
  .stat .l{font-size:11px; color:var(--dim); letter-spacing:.06em}
  .sect{font-size:11px; color:var(--dim); letter-spacing:.14em; margin:0 0 8px}
  .desc{font-size:14px; line-height:1.85; margin-bottom:24px; white-space:pre-wrap}
  .official{font-size:12.5px; color:var(--muted); line-height:1.75; margin-bottom:24px; white-space:pre-wrap}
  .mtags{display:flex; gap:7px; flex-wrap:wrap; margin-bottom:28px}
  .openbtn{display:inline-block; border:1px solid var(--accent); color:var(--accent);
    padding:10px 22px; border-radius:3px; font-size:13.5px; letter-spacing:.04em; transition:.12s;}
  .openbtn:hover{background:var(--accent); color:#14100a}

  footer{padding:40px 0 0; margin-top:60px; border-top:1px solid var(--line-soft);
    color:var(--dim); font-size:12px; line-height:1.9;}
  footer code{color:var(--muted); font-size:11.5px}

  @media(max-width:640px){
    h1{font-size:21px} h1 .thin{display:none}
    nav.cats{gap:20px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:20px 12px}
    .mbody{padding:20px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="masthead">
      <h1>お気に入りワールド<span class="thin">VRChat</span></h1>
      <div class="byline">Curated by <b>アスユイ</b></div>
    </div>
    <nav class="cats" id="cats"></nav>
    <div class="catdesc" id="catdesc"></div>
  </header>

  <div class="controls">
    <div class="search">
      <input id="q" type="text" placeholder="ワールド名・タグ・説明・定員で検索" autocomplete="off">
    </div>
    <select id="sort">
      <option value="fav">お気に入りが多い順</option>
      <option value="visits">訪問数が多い順</option>
      <option value="name">名前順</option>
      <option value="cap">定員が多い順</option>
      <option value="capmin">定員が少ない順</option>
    </select>
    <span class="count" id="count"></span>
  </div>

  <div class="chips" id="chips"></div>
  <div class="grid" id="grid"></div>

  <footer>
    VRChatのお気に入りグループから同期。ワールドの追加・説明の編集は <code>data.js</code> を編集します。
  </footer>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>document.write('<script src="data.js?v=' + Date.now() + '"><\/script>');</script>
<script>
(function(){
  const WORLDS = window.WORLDS || [];
  const CATEGORIES = (window.CATEGORIES || []).filter(c=>c.ready!==false);
  let activeCat = (CATEGORIES[0] || {}).id;
  let activeTags = new Set();
  let query = "", sortBy = "fav";

  const $ = s => document.querySelector(s);
  const catsEl=$("#cats"), catDescEl=$("#catdesc"), chipsEl=$("#chips"),
        gridEl=$("#grid"), countEl=$("#count"), qEl=$("#q"), sortEl=$("#sort");

  const worldsIn = id => WORLDS.filter(w => w.category === id);
  const esc = s => (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const worldUrl = id => "https://vrchat.com/home/world/" + id;
  const num = n => (n||0).toLocaleString();

  function renderCats(){
    catsEl.innerHTML = CATEGORIES.map(c=>
      `<div class="cat${c.id===activeCat?" active":""}" data-cat="${c.id}">${esc(c.name)}<span class="n">${worldsIn(c.id).length}</span></div>`
    ).join("");
    catsEl.querySelectorAll(".cat").forEach(el=>{
      el.addEventListener("click",()=>{
        activeCat = el.dataset.cat; activeTags.clear(); query=""; qEl.value="";
        renderCats(); renderChips(); render();
      });
    });
    const c = CATEGORIES.find(x=>x.id===activeCat);
    catDescEl.textContent = c ? c.desc : "";
  }

  function renderChips(){
    const counts = {};
    worldsIn(activeCat).forEach(w => (w.tags||[]).forEach(t => counts[t]=(counts[t]||0)+1));
    const tags = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
    chipsEl.innerHTML = tags.map(t=>
      `<span class="chip${activeTags.has(t)?" on":""}" data-tag="${esc(t)}">${esc(t)}<span class="n">${counts[t]}</span></span>`
    ).join("");
    chipsEl.querySelectorAll(".chip").forEach(el=>{
      el.addEventListener("click",()=>{
        const t = el.dataset.tag;
        activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t);
        renderChips(); render();
      });
    });
  }

  function matches(w){
    for(const t of activeTags){ if(!(w.tags||[]).includes(t)) return false; }
    if(query){
      const q = query.toLowerCase();
      const hay = [w.name,w.note,w.official,w.subtype,(w.tags||[]).join(" "),
                   "定員"+w.capacity,w.capacity,w.recommendedCapacity].join(" ").toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }
  function sortWorlds(arr){
    const a=[...arr];
    if(sortBy==="fav")    a.sort((x,y)=>(y.favorites||0)-(x.favorites||0));
    if(sortBy==="visits") a.sort((x,y)=>(y.visits||0)-(x.visits||0));
    if(sortBy==="name")   a.sort((x,y)=>(x.name||"").localeCompare(y.name||"","ja"));
    if(sortBy==="cap")    a.sort((x,y)=>(y.capacity||0)-(x.capacity||0));
    if(sortBy==="capmin") a.sort((x,y)=>(x.capacity||0)-(y.capacity||0));
    return a;
  }

  function render(){
    const list = sortWorlds(worldsIn(activeCat).filter(matches));
    countEl.textContent = list.length + " 件";
    if(!list.length){
      gridEl.innerHTML = `<div class="empty">条件に合うワールドが見つかりませんでした。</div>`;
      return;
    }
    gridEl.innerHTML = list.map(w=>{
      const idx = WORLDS.indexOf(w);
      return `<div class="card" data-i="${idx}">
        <div class="thumb">
          <img loading="lazy" src="${esc(w.thumb)}" alt="" onerror="this.style.display='none'">
          <span class="cap">定員 ${w.capacity||"?"}</span>
        </div>
        <div class="body">
          ${w.subtype?`<div class="sub">${esc(w.subtype)}</div>`:""}
          <div class="cardname">${esc(w.name)}</div>
          <div class="note">${esc(w.note||"")}</div>
          <div class="meta">
            ${w.favorites?`<span>お気に入り ${num(w.favorites)}</span>`:""}
            ${w.visits?`<span>訪問 ${num(w.visits)}</span>`:""}
          </div>
        </div>
      </div>`;
    }).join("");
    gridEl.querySelectorAll(".card").forEach(el=>{
      el.addEventListener("click",()=>openModal(WORLDS[+el.dataset.i]));
    });
  }

  function openModal(w){
    const tags = (w.tags||[]).map(t=>`<span class="chip" data-tag="${esc(t)}">${esc(t)}</span>`).join("");
    $("#modal").innerHTML = `
      <div class="mhero">
        <img src="${esc(w.thumb)}" alt="" onerror="this.style.opacity=0">
        <div class="close" id="closeM">✕</div>
      </div>
      <div class="mbody">
        ${w.subtype?`<div class="sub" style="margin-bottom:4px">${esc(w.subtype)}</div>`:""}
        <h2>${esc(w.name)}</h2>
        <div class="msub">${esc(w.id)}</div>
        <div class="stats">
          <div class="stat"><div class="n">${w.capacity||"?"}</div><div class="l">最大人数</div></div>
          <div class="stat"><div class="n">${w.recommendedCapacity||"?"}</div><div class="l">推奨人数</div></div>
          <div class="stat"><div class="n">${num(w.favorites)}</div><div class="l">お気に入り</div></div>
          <div class="stat"><div class="n">${num(w.visits)}</div><div class="l">訪問数</div></div>
        </div>
        <p class="sect">ワールド説明</p>
        <div class="desc">${esc(w.note||"（未記入）")}</div>
        ${w.official?`<p class="sect">VRCHAT 原文</p><div class="official">${esc(w.official)}</div>`:""}
        ${tags?`<p class="sect">タグ</p><div class="mtags">${tags}</div>`:""}
        <a class="openbtn" href="${worldUrl(w.id)}" target="_blank" rel="noopener">VRChatで開く</a>
      </div>`;
    $("#overlay").classList.add("show");
    $("#closeM").addEventListener("click",closeModal);
    $("#modal").querySelectorAll(".mtags .chip").forEach(el=>{
      el.addEventListener("click",()=>{
        activeTags = new Set([el.dataset.tag]); closeModal(); renderChips(); render();
        window.scrollTo({top:0,behavior:"smooth"});
      });
    });
  }
  function closeModal(){ $("#overlay").classList.remove("show"); }
  $("#overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") closeModal(); });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

  qEl.addEventListener("input",e=>{ query=e.target.value.trim(); render(); });
  sortEl.addEventListener("change",e=>{ sortBy=e.target.value; render(); });

  renderCats(); renderChips(); render();
})();
</script>
</body>
</html>
