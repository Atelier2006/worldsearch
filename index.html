<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アスユイのお気に入りワールド | World Search</title>
<style>
  :root{
    --bg:#0c0e14; --bg2:#141824; --card:#1a1f2e; --card2:#222839;
    --line:#2a3145; --text:#e8ecf5; --sub:#9aa4bd; --dim:#6b748c;
    --accent:#6c8cff; --accent2:#a06cff; --good:#4ecb8d; --warn:#ffbe5c;
    --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI",-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,rgba(108,140,255,.12),transparent 60%),
               radial-gradient(1000px 500px at 0% 0%,rgba(160,108,255,.10),transparent 55%),
               var(--bg);
    color:var(--text); min-height:100vh; line-height:1.6;
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px 80px}

  /* header */
  header{padding:34px 0 18px;}
  .brand{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand h1{font-size:26px;margin:0;letter-spacing:.02em;font-weight:800}
  .brand .accent{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .who{font-size:13px;color:var(--sub);background:var(--bg2);border:1px solid var(--line);padding:4px 12px;border-radius:999px}
  .tagline{color:var(--sub);font-size:14px;margin-top:8px}

  /* category tabs */
  .cats{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0 6px}
  .cat{
    display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;
    background:var(--bg2);border:1px solid var(--line);border-radius:14px;
    padding:12px 16px;transition:.15s;position:relative;
  }
  .cat:hover{border-color:var(--accent);transform:translateY(-1px)}
  .cat.active{background:linear-gradient(135deg,rgba(108,140,255,.22),rgba(160,108,255,.18));border-color:var(--accent)}
  .cat.disabled{opacity:.5;cursor:not-allowed}
  .cat .ico{font-size:20px}
  .cat .cname{font-weight:700;font-size:15px}
  .cat .cnum{font-size:12px;color:var(--dim);margin-left:2px}
  .cat .soon{position:absolute;top:-8px;right:-6px;font-size:10px;background:var(--warn);color:#3a2a00;font-weight:700;padding:1px 7px;border-radius:999px}
  .catdesc{color:var(--sub);font-size:13.5px;margin:6px 2px 0;min-height:20px}

  /* controls */
  .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:20px 0 6px}
  .search{flex:1;min-width:240px;position:relative}
  .search input{
    width:100%;padding:13px 16px 13px 42px;border-radius:12px;border:1px solid var(--line);
    background:var(--bg2);color:var(--text);font-size:15px;outline:none;transition:.15s;
  }
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,140,255,.15)}
  .search .mag{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--dim)}
  select,.sortsel{
    padding:12px 14px;border-radius:12px;border:1px solid var(--line);
    background:var(--bg2);color:var(--text);font-size:14px;outline:none;cursor:pointer;
  }
  .count{color:var(--sub);font-size:13px;margin-left:auto}

  /* tag filter chips */
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 4px}
  .chip{
    font-size:12.5px;padding:6px 12px;border-radius:999px;cursor:pointer;
    background:var(--bg2);border:1px solid var(--line);color:var(--sub);transition:.12s;
  }
  .chip:hover{color:var(--text);border-color:var(--accent)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

  /* grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:22px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;
    display:flex;flex-direction:column;transition:.18s;cursor:pointer;box-shadow:var(--shadow)
  }
  .card:hover{transform:translateY(-4px);border-color:var(--accent)}
  .thumb{position:relative;aspect-ratio:16/10;background:linear-gradient(135deg,#232a3d,#171b28);overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;color:#454f6b;font-weight:800}
  .thumb .sub{position:absolute;left:10px;top:10px;background:rgba(10,12,20,.72);backdrop-filter:blur(4px);font-size:11px;padding:4px 10px;border-radius:999px;color:var(--text);border:1px solid rgba(255,255,255,.08)}
  .thumb .cap{position:absolute;right:10px;top:10px;background:rgba(10,12,20,.72);backdrop-filter:blur(4px);font-size:11px;padding:4px 10px;border-radius:999px;color:var(--good);border:1px solid rgba(255,255,255,.08);font-weight:600}
  .body{padding:14px 15px 15px;display:flex;flex-direction:column;gap:9px;flex:1}
  .cardname{font-weight:700;font-size:16px;line-height:1.35}
  .note{font-size:13px;color:var(--sub);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .ctags{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
  .ctag{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--card2);color:var(--sub);border:1px solid var(--line)}
  .meta{display:flex;gap:14px;font-size:12px;color:var(--dim);margin-top:2px}
  .meta b{color:var(--sub);font-weight:600}

  /* empty */
  .empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--dim)}
  .empty .big{font-size:44px;margin-bottom:10px}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(6,8,14,.72);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:24px;z-index:50}
  .overlay.show{display:flex}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:22px;max-width:760px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow)}
  .mhero{position:relative;aspect-ratio:16/9;background:linear-gradient(135deg,#232a3d,#171b28);overflow:hidden}
  .mhero img{width:100%;height:100%;object-fit:cover}
  .mhero .close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;background:rgba(10,12,20,.7);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .mbody{padding:22px 24px 26px}
  .mbody h2{margin:0 0 4px;font-size:22px}
  .msub{color:var(--dim);font-size:13px;margin-bottom:16px}
  .stats{display:flex;gap:22px;flex-wrap:wrap;margin:16px 0;padding:14px 16px;background:var(--bg2);border-radius:12px;border:1px solid var(--line)}
  .stat .n{font-size:19px;font-weight:800;color:var(--text)}
  .stat .l{font-size:11px;color:var(--dim)}
  .section-t{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:.05em;margin:18px 0 6px;text-transform:uppercase}
  .desc-box{font-size:14.5px;color:var(--text);background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:10px;padding:14px 16px;white-space:pre-wrap}
  .official{font-size:13.5px;color:var(--sub);white-space:pre-wrap}
  .mtags{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
  .mtags .ctag{cursor:pointer}
  .openbtn{display:inline-flex;align-items:center;gap:8px;margin-top:22px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;padding:13px 22px;border-radius:12px;font-size:15px;transition:.15s}
  .openbtn:hover{filter:brightness(1.1);transform:translateY(-1px)}

  footer{color:var(--dim);font-size:12px;text-align:center;margin-top:50px;padding-top:24px;border-top:1px solid var(--line)}
  @media(max-width:560px){.brand h1{font-size:21px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>お気に入り<span class="accent">ワールド</span>コレクション</h1>
      <span class="who">👤 アスユイ</span>
    </div>
    <div class="tagline">VRChatのお気に入りワールドを、カテゴリと検索で辿るためのポータル。</div>

    <div class="cats" id="cats"></div>
    <div class="catdesc" id="catdesc"></div>
  </header>

  <div class="controls">
    <div class="search">
      <span class="mag">🔍</span>
      <input id="q" type="text" placeholder="ワールド名・タグ・説明・定員（例: 32, museum, 絵画）で検索…" autocomplete="off">
    </div>
    <select id="sort" class="sortsel">
      <option value="fav">人気順（お気に入り）</option>
      <option value="visits">訪問数順</option>
      <option value="name">名前順</option>
      <option value="cap">定員が多い順</option>
      <option value="capmin">定員が少ない順</option>
    </select>
    <span class="count" id="count"></span>
  </div>

  <div class="chips" id="chips"></div>

  <div class="grid" id="grid"></div>

  <footer>
    アスユイのお気に入りワールド検索サイト ／ データは VRChat のお気に入りより。<br>
    ワールドやカテゴリの追加は <code>data.js</code> を編集するだけで反映されます。
  </footer>
</div>

<!-- detail modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script src="data.js"></script>
<script>
(function(){
  const WORLDS = window.WORLDS || [];
  const CATEGORIES = window.CATEGORIES || [];
  let activeCat = (CATEGORIES.find(c=>c.ready) || CATEGORIES[0] || {}).id;
  let activeTags = new Set();
  let query = "";
  let sortBy = "fav";

  const $ = s => document.querySelector(s);
  const catsEl = $("#cats"), catDescEl = $("#catdesc"), chipsEl = $("#chips"),
        gridEl = $("#grid"), countEl = $("#count"), qEl = $("#q"), sortEl = $("#sort");

  const worldsIn = id => WORLDS.filter(w => w.category === id);
  const esc = s => (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const initial = n => (n||"?").trim().charAt(0).toUpperCase();
  const worldUrl = id => "https://vrchat.com/home/world/" + id;

  /* ---- categories ---- */
  function renderCats(){
    catsEl.innerHTML = CATEGORIES.map(c=>{
      const n = worldsIn(c.id).length;
      const cls = "cat" + (c.id===activeCat?" active":"") + (c.ready?"":" disabled");
      const soon = c.ready ? "" : `<span class="soon">準備中</span>`;
      return `<div class="${cls}" data-cat="${c.id}" data-ready="${c.ready}">
        ${soon}<span class="ico">${c.icon||"📁"}</span>
        <span class="cname">${esc(c.name)}<span class="cnum"> ${n}</span></span></div>`;
    }).join("");
    catsEl.querySelectorAll(".cat").forEach(el=>{
      el.addEventListener("click",()=>{
        if(el.dataset.ready!=="true"){ flashSoon(el); return; }
        activeCat = el.dataset.cat; activeTags.clear(); query=""; qEl.value="";
        renderCats(); renderChips(); render();
      });
    });
    const c = CATEGORIES.find(x=>x.id===activeCat);
    catDescEl.textContent = c ? c.desc : "";
  }
  function flashSoon(el){
    el.animate([{transform:"translateX(0)"},{transform:"translateX(-4px)"},{transform:"translateX(4px)"},{transform:"translateX(0)"}],{duration:220});
  }

  /* ---- tag chips ---- */
  function renderChips(){
    const counts = {};
    worldsIn(activeCat).forEach(w => (w.tags||[]).forEach(t => counts[t]=(counts[t]||0)+1));
    const tags = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
    chipsEl.innerHTML = tags.map(t=>
      `<span class="chip${activeTags.has(t)?" on":""}" data-tag="${esc(t)}">#${esc(t)} <span style="opacity:.6">${counts[t]}</span></span>`
    ).join("");
    chipsEl.querySelectorAll(".chip").forEach(el=>{
      el.addEventListener("click",()=>{
        const t = el.dataset.tag;
        activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t);
        renderChips(); render();
      });
    });
  }

  /* ---- filter + sort ---- */
  function matches(w){
    for(const t of activeTags){ if(!(w.tags||[]).includes(t)) return false; }
    if(query){
      const q = query.toLowerCase();
      const hay = [w.name, w.note, w.official, w.subtype, (w.tags||[]).join(" "),
                   "定員"+w.capacity, w.capacity, w.recommendedCapacity].join(" ").toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }
  function sortWorlds(arr){
    const a=[...arr];
    if(sortBy==="fav")   a.sort((x,y)=>(y.favorites||0)-(x.favorites||0));
    if(sortBy==="visits")a.sort((x,y)=>(y.visits||0)-(x.visits||0));
    if(sortBy==="name")  a.sort((x,y)=>(x.name||"").localeCompare(y.name||"","ja"));
    if(sortBy==="cap")   a.sort((x,y)=>(y.capacity||0)-(x.capacity||0));
    if(sortBy==="capmin")a.sort((x,y)=>(x.capacity||0)-(y.capacity||0));
    return a;
  }

  /* ---- grid ---- */
  function render(){
    const list = sortWorlds(worldsIn(activeCat).filter(matches));
    countEl.textContent = list.length + " ワールド表示中";
    if(!list.length){
      gridEl.innerHTML = `<div class="empty"><div class="big">🔍</div>条件に合うワールドが見つかりませんでした。<br>タグや検索語を変えてみてください。</div>`;
      return;
    }
    gridEl.innerHTML = list.map((w,i)=>{
      const idx = WORLDS.indexOf(w);
      const tags = (w.tags||[]).slice(0,4).map(t=>`<span class="ctag">#${esc(t)}</span>`).join("");
      return `<div class="card" data-i="${idx}">
        <div class="thumb">
          <div class="ph">${esc(initial(w.name))}</div>
          <img loading="lazy" src="${esc(w.thumb)}" alt="" onerror="this.style.display='none'">
          ${w.subtype?`<span class="sub">${esc(w.subtype)}</span>`:""}
          <span class="cap">👥 ${w.capacity||"?"}</span>
        </div>
        <div class="body">
          <div class="cardname">${esc(w.name)}</div>
          <div class="note">${esc(w.note||w.official||"")}</div>
          <div class="meta">
            ${w.favorites?`<span><b>★ ${w.favorites.toLocaleString()}</b></span>`:""}
            ${w.visits?`<span>👣 ${w.visits.toLocaleString()}</span>`:""}
          </div>
          <div class="ctags">${tags}</div>
        </div>
      </div>`;
    }).join("");
    gridEl.querySelectorAll(".card").forEach(el=>{
      el.addEventListener("click",()=>openModal(WORLDS[+el.dataset.i]));
    });
  }

  /* ---- modal ---- */
  function openModal(w){
    const tags = (w.tags||[]).map(t=>`<span class="ctag" data-tag="${esc(t)}">#${esc(t)}</span>`).join("");
    $("#modal").innerHTML = `
      <div class="mhero">
        <img src="${esc(w.thumb)}" alt="" onerror="this.style.opacity=0">
        <div class="close" id="closeM">✕</div>
      </div>
      <div class="mbody">
        <h2>${esc(w.name)}</h2>
        <div class="msub">${esc(w.subtype||"")} ・ ${esc(w.id)}</div>
        <div class="stats">
          <div class="stat"><div class="n">👥 ${w.capacity||"?"}</div><div class="l">最大人数</div></div>
          <div class="stat"><div class="n">${w.recommendedCapacity||"?"}</div><div class="l">推奨人数</div></div>
          <div class="stat"><div class="n">★ ${(w.favorites||0).toLocaleString()}</div><div class="l">お気に入り</div></div>
          <div class="stat"><div class="n">${(w.visits||0).toLocaleString()}</div><div class="l">訪問数</div></div>
        </div>
        <div class="section-t">ワールド説明</div>
        <div class="desc-box">${esc(w.note||"（未記入）")}</div>
        ${w.official?`<div class="section-t">VRChat 公式説明</div><div class="official">${esc(w.official)}</div>`:""}
        <div class="section-t">タグ</div>
        <div class="mtags">${tags||'<span class="official">なし</span>'}</div>
        <a class="openbtn" href="${worldUrl(w.id)}" target="_blank" rel="noopener">🌐 VRChatでこのワールドを開く</a>
      </div>`;
    $("#overlay").classList.add("show");
    $("#closeM").addEventListener("click",closeModal);
    $("#modal").querySelectorAll(".mtags .ctag").forEach(el=>{
      el.addEventListener("click",()=>{
        activeTags = new Set([el.dataset.tag]); closeModal(); renderChips(); render();
        window.scrollTo({top:0,behavior:"smooth"});
      });
    });
  }
  function closeModal(){ $("#overlay").classList.remove("show"); }
  $("#overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") closeModal(); });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

  /* ---- events ---- */
  qEl.addEventListener("input",e=>{ query=e.target.value.trim(); render(); });
  sortEl.addEventListener("change",e=>{ sortBy=e.target.value; render(); });

  renderCats(); renderChips(); render();
})();
</script>
</body>
</html>
